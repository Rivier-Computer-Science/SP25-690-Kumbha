dataset:
  name: cifar10
  root: ./data
  batch_size: 128
  num_workers: 4

model:
  cnn:
    num_classes: 10
  vit:
    num_classes: 10
    img_size: 224
    patch_size: 16

training:
  epochs: 30
  lr: 0.001
  weight_decay: 0.0005
  seed: 42
  device: cuda

selective:
  reject_threshold: 0.85
  num_thresholds: 20

corruption:
  prob: 0.3
  types: ["gaussian_noise", "blur", "brightness"]
  severity: [1, 3, 5]
